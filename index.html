<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<title>Fulla - السياسات</title>
<style>
:root{--orange:#ff7900;--orange-light:#fff1e3;--bg:#fff7f1;--text:#222;--muted:#666;--border:#ffd2ad}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,var(--bg),#fff);color:var(--text);line-height:1.9}
header{background:var(--orange);color:white;padding:38px 20px;text-align:center}
header h1{margin:0;font-size:36px}
header p{margin:8px 0 0}
main{max-width:900px;margin:30px auto;padding:0 18px}
.card{background:white;border:1px solid var(--border);border-radius:20px;padding:28px;box-shadow:0 10px 30px rgba(255,121,0,.12)}
.links a{display:block;background:var(--orange-light);border:1px solid var(--border);border-radius:14px;padding:16px;margin:12px 0;color:var(--orange);font-weight:bold;text-decoration:none}
.links a:hover{background:#ffe4cc}
footer{text-align:center;color:var(--muted);padding:25px;font-size:14px}
</style>
</head>

<main>

</html>
